<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>当夏｜菜单选择 → 自动报价单（手机版）</title>
    <link rel="stylesheet" href="./styles.css?v=uploadfix1" />
  </head>
  <body class="mobile">
    <header class="topbar">
      <div class="brand">
        <div class="brand__title">当夏烘焙</div>
        <div class="brand__subtitle">菜单勾选 → 自动生成报价单（可打印 / 导出 PDF）</div>
      </div>
      <div class="topbar__actions">
        <button id="btnReset" class="btn btn--ghost" type="button">清空</button>
        <button id="btnExportCsv" class="btn btn--ghost" type="button">导出表格</button>
        <button id="btnExportPdf" class="btn btn--ghost" type="button">导出PDF</button>
        <button id="btnScreenshot" class="btn btn--ghost" type="button">截图导出</button>
        <button id="btnExportImage" class="btn" type="button">导出长图</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel panel--left">
        <div class="tabs">
          <button class="tab tab--active" type="button" data-tab="menu">菜单</button>
          <button class="tab" type="button" data-tab="style">摆台风格</button>
          <button class="tab" type="button" data-tab="quote">报价单</button>
        </div>

        <section class="tabpane tabpane--active" data-pane="menu">
          <div class="controls">
            <div class="categoryBar" id="categoryBar"></div>
            <input id="menuSearch" class="input" type="search" placeholder="搜索产品（例如：纸杯蛋糕 / 慕斯 / 泡芙）" />
            <div class="controls__row">
              <button id="btnAddCustom" class="btn btn--ghost btn--sm" type="button">上传</button>
              <label class="checkbox">
                <input id="onlySelected" type="checkbox" />
                仅看已选
              </label>
              <span class="muted" id="menuCount"></span>
            </div>
          </div>
          <div id="menuList" class="list"></div>
        </section>

        <section class="tabpane" data-pane="style">
          <div class="controls">
            <div class="controls__row">
              <button id="btnAddStyle" class="btn btn--ghost btn--sm" type="button">上传</button>
              <span class="muted" id="styleCount"></span>
            </div>
          </div>
          <div id="styleList" class="list"></div>
        </section>

        <section class="tabpane" data-pane="quote">
          <div class="controls">
            <div class="controls__grid">
              <label class="field">
                <div class="field__label">日期</div>
                <input id="metaDate" class="input" type="text" placeholder="例如：230927 / 2026-05-11" />
              </label>
              <label class="field">
                <div class="field__label">地点</div>
                <input id="metaLocation" class="input" type="text" placeholder="例如：科学城" />
              </label>
              <label class="field">
                <div class="field__label">客户</div>
                <input id="metaCustomer" class="input" type="text" placeholder="客户名称" />
              </label>
              <label class="field">
                <div class="field__label">联系人 / 电话</div>
                <input id="metaContact" class="input" type="text" placeholder="联系人（可选）" />
              </label>
              <label class="field">
                <div class="field__label">折扣</div>
                <div class="field__row">
                  <input id="metaDiscount" class="input input--num" type="number" min="0" max="100" step="0.1" />
                  <span class="field__suffix">%（例如 88 = 8.8 折）</span>
                </div>
              </label>
              <label class="field">
                <div class="field__label">税点</div>
                <div class="field__row">
                  <input id="metaTaxPercent" class="input input--num" type="number" min="0" max="100" step="0.1" placeholder="例如：6" />
                  <span class="field__suffix">%（含税价 = 合计 + 合计 × 税点）</span>
                </div>
              </label>
              <label class="field">
                <div class="field__label">优惠价（可选）</div>
                <div class="field__row">
                  <input id="metaFinalPrice" class="input input--num" type="number" min="0" step="1" placeholder="例如：2300" />
                  <span class="field__suffix">元（填写后将覆盖折扣计算）</span>
                </div>
              </label>
              <label class="field">
                <div class="field__label">备注</div>
                <input id="metaNote" class="input" type="text" placeholder="例如：不含税 / 需提前一周预定" />
              </label>
              <label class="field">
                <div class="field__label">订购说明（可选）</div>
                <textarea id="metaOrderNotes" class="input input--textarea" rows="5" placeholder="每行一条，例如：&#10;1. 甜品台为预约项目，建议提前预定档期。&#10;2. 动物奶油易融，空调环境建议摆放 2–3 小时。"></textarea>
              </label>
              <label class="field">
                <div class="field__label">订购说明标题（可选）</div>
                <input id="metaOrderNotesTitle" class="input" type="text" placeholder="例如：订购说明 / 订购须知" />
              </label>
            </div>
            <div class="controls__row">
              <button id="btnLoadTemplate" class="btn btn--ghost" type="button">一键载入“表2示例”</button>
              <span class="muted">提示：你也可以只从菜单勾选生成报价行。</span>
            </div>
          </div>
        </section>
      </aside>

      <section class="panel panel--right">
        <div id="quotePaper" class="paper">
          <div class="paper__head">
            <div class="paper__headTop">
              <img class="paper__logo" src="./assets/brand/logo.png" alt="当夏烘焙" />
              <div class="paper__title">【当夏烘焙】甜品台服务 报价单</div>
            </div>
            <div class="paper__meta">
              <div class="paper__metaCol">
                <div class="paper__metaItem"><span class="k">时间：</span><span id="qDate"></span></div>
                <div class="paper__metaItem"><span class="k">地点：</span><span id="qLocation"></span></div>
                <div class="paper__metaItem"><span class="k">客户：</span><span id="qCustomer"></span></div>
                <div class="paper__metaItem"><span class="k">联系人：</span><span id="qContact"></span></div>
                <div class="paper__metaItem"><span class="k">备注：</span><span id="qNote"></span></div>
              </div>
            </div>
          </div>

          <table class="table" id="quoteTable">
            <thead>
              <tr>
                <th class="col--seq">序号</th>
                <th class="col--img">图片</th>
                <th>内容（可编辑）</th>
                <th class="col--qty">数量</th>
                <th class="col--price">单价</th>
                <th class="col--price">总价</th>
                <th class="col--act no-print"></th>
              </tr>
            </thead>
            <tbody id="quoteTbody"></tbody>
          </table>

          <div class="totals">
            <div class="totals__row">
              <div class="totals__label">合计</div>
              <div class="totals__value" id="subtotal"></div>
            </div>
            <div class="totals__row">
              <div class="totals__label">含税价</div>
              <div class="totals__value" id="taxIncluded"></div>
            </div>
            <div class="totals__row totals__row--highlight">
              <div class="totals__label">优惠价</div>
              <div class="totals__value" id="totalAfterDiscount"></div>
            </div>
          </div>

          <div class="paper__foot">
            <div id="qOrderNotesTitle" class="paper__footTitle" contenteditable="true" spellcheck="false">订购说明（可编辑）</div>
            <div id="qOrderNotes" class="orderNotes" contenteditable="true" spellcheck="false"></div>
          </div>
          <div id="qStyles" class="quoteStyles"></div>
        </div>
      </section>
    </main>

    <div id="imageModal" class="modal" aria-hidden="true">
      <div class="modal__backdrop" data-close="1"></div>
      <div class="modal__content" role="dialog" aria-modal="true" aria-label="查看图片">
        <button id="modalClose" class="modal__close" type="button" aria-label="关闭">×</button>
        <img id="modalImg" class="modal__img" alt="" />
        <div id="modalCaption" class="modal__caption"></div>
      </div>
    </div>

    <div id="customModal" class="modal" aria-hidden="true">
      <div class="modal__backdrop" data-close-custom="1"></div>
      <div class="modal__content modal__content--form" role="dialog" aria-modal="true" aria-label="新增自定义产品">
        <button class="modal__close" type="button" data-close-custom="1" aria-label="关闭">×</button>
        <div class="modal__title">新增自定义产品</div>

        <div class="modal__body">
          <div class="formGrid">
            <label class="field">
              <div class="field__label">产品名称</div>
              <input id="customName" class="input" type="text" placeholder="例如：芒果千层" />
            </label>
            <label class="field">
              <div class="field__label">分类</div>
              <input id="customCategory" class="input" type="text" placeholder="点击选择或输入新增分类" list="customCategoryList" />
              <datalist id="customCategoryList"></datalist>
            </label>
            <label class="field">
              <div class="field__label">单价（元）</div>
              <input id="customPrice" class="input input--num" type="number" min="0" step="0.5" placeholder="例如：12" />
            </label>
            <label class="field">
              <div class="field__label">起订量</div>
              <input id="customMinOrder" class="input" type="text" placeholder="例如：10份 / 1项" />
            </label>
            <label class="field">
              <div class="field__label">图片上传</div>
              <input id="customFile" class="input" type="file" accept="image/*" />
            </label>
          </div>

          <div class="cropWrap" id="cropWrap" hidden>
            <div class="cropStage" id="cropStage">
              <img id="cropImg" alt="裁剪预览" />
              <div class="cropMask" aria-hidden="true"></div>
              <div class="cropBox" id="cropBox" aria-hidden="true"><div class="cropHandle" id="cropHandle" aria-hidden="true"></div></div>
            </div>
            <div class="cropHint muted">拖动图片调整位置；滚轮/触控板可缩放。裁剪为与菜单缩略图一致的方形。</div>
          </div>
        </div>

        <div class="modal__actions">
          <button id="btnCustomCancel" class="btn btn--ghost" type="button">取消</button>
          <button id="btnCustomSave" class="btn" type="button">确认上传</button>
        </div>
      </div>
    </div>

    <div id="pdfOptionsModal" class="modal" aria-hidden="true">
      <div class="modal__backdrop" data-close-pdfopt="1"></div>
      <div class="modal__content modal__content--small" role="dialog" aria-modal="true" aria-label="导出PDF选项">
        <button class="modal__close" type="button" data-close-pdfopt="1" aria-label="关闭">×</button>
        <div class="modal__title">导出 PDF 选项</div>
        <label class="checkbox">
          <input id="pdfOptShowLogo" type="checkbox" />
          显示左上角 Logo
        </label>
        <div class="muted" style="margin-top:6px">水印仍由浏览器打印预览右侧“背景图形”控制。</div>
        <div class="modal__actions">
          <button id="btnPdfOptCancel" class="btn btn--ghost" type="button">取消</button>
          <button id="btnPdfOptGo" class="btn" type="button">继续导出</button>
        </div>
      </div>
    </div>

    <div id="styleModal" class="modal" aria-hidden="true">
      <div class="modal__backdrop" data-close-style="1"></div>
      <div class="modal__content modal__content--form" role="dialog" aria-modal="true" aria-label="新增摆台风格">
        <button class="modal__close" type="button" data-close-style="1" aria-label="关闭">×</button>
        <div class="modal__title">新增摆台风格</div>

        <div class="modal__body">
          <div class="formGrid">
            <label class="field">
              <div class="field__label">分类</div>
              <input id="styleCategory" class="input" type="text" placeholder="例如：中秋国庆 / 生日 / 森系" />
            </label>
            <label class="field">
              <div class="field__label">图片上传（16:9）</div>
              <input id="styleFile" class="input" type="file" accept="image/*" />
            </label>
          </div>

          <div class="cropWrap" id="styleCropWrap" hidden>
            <div class="cropStage cropStage--169" id="styleCropStage">
              <img id="styleCropImg" alt="裁剪预览" />
              <div class="cropMask" aria-hidden="true"></div>
              <div class="cropBox cropBox--169" id="styleCropBox" aria-hidden="true">
                <div class="cropHandle" id="styleCropHandle" aria-hidden="true"></div>
              </div>
            </div>
            <div class="cropHint muted">拖动裁剪框与图片，比例固定 16:9。</div>
          </div>
        </div>

        <div class="modal__actions">
          <button id="btnStyleCancel" class="btn btn--ghost" type="button">取消</button>
          <button id="btnStyleSave" class="btn" type="button">确认上传</button>
        </div>
      </div>
    </div>

    <script src="./data/menu.js"></script>
    <script src="./data/template_quote.js"></script>
    <script src="./vendor/exceljs.min.js"></script>
    <script src="./app.js?v=style4"></script>
  </body>
</html>
